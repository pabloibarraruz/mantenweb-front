<div class="wrap">
  <section class="card">
    <div class="card-head">
      <span class="eyebrow soft">Recuperación</span>
      <h1>Recuperar contraseña</h1>
      <p>Ingresa tu correo institucional para generar un enlace temporal.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Correo</span>
        <input type="email" formControlName="correo" placeholder="nombre@hospital.cl" />
      </label>
      <div class="err" *ngIf="correoCtrl?.touched && correoCtrl?.invalid">
        Ingresa un correo válido.
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Generar enlace' }}
      </button>
    </form>

    <div class="ok banner" *ngIf="message">{{ message }}</div>
    <div class="err banner" *ngIf="errorMsg">{{ errorMsg }}</div>

    <a class="back-link" routerLink="/login">Volver al inicio de sesión</a>
  </section>
</div>
