<div class="wrap">
  <section class="card">
    <div class="card-head">
      <span class="eyebrow soft">Nueva clave</span>
      <h1>Cambiar contraseña</h1>
      <p>Escribe una nueva contraseña para tu cuenta.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Nueva contraseña</span>
        <input
          type="password"
          formControlName="nuevaContrasena"
          placeholder="Mínimo 6 caracteres"
        />
      </label>
      <div class="err" *ngIf="nuevaCtrl?.touched && nuevaCtrl?.invalid">
        La contraseña debe tener al menos 6 caracteres.
      </div>

      <label>
        <span>Confirmar contraseña</span>
        <input
          type="password"
          formControlName="confirmarContrasena"
          placeholder="Repite la contraseña"
        />
      </label>
      <div class="err" *ngIf="confirmarCtrl?.touched && confirmarCtrl?.invalid">
        Confirma la contraseña.
      </div>
      <div class="err" *ngIf="passwordsDoNotMatch">
        Las contraseñas no coinciden.
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Actualizar contraseña' }}
      </button>
    </form>

    <div class="ok banner" *ngIf="message">{{ message }}</div>
    <div class="err banner" *ngIf="errorMsg">{{ errorMsg }}</div>

    <a class="back-link" routerLink="/login">Volver al inicio de sesión</a>
  </section>
</div>
